apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "arypodr.fullname" . }}
  labels:
    {{- include "arypodr.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "arypodr.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "arypodr.selectorLabels" . | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
    spec:
      securityContext:
        runAsUser: {{ .Values.podSecurityContext.runAsUser }}
        runAsGroup: {{ .Values.podSecurityContext.runAsGroup }}
        fsGroup: {{ .Values.podSecurityContext.fsGroup }}
      containers:
        - name: arypodr
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
          envFrom:
            - configMapRef:
                name: {{ include "arypodr.fullname" . }}
            - secretRef:
                name: {{ include "arypodr.fullname" . }}
          volumeMounts:
            - name: db-data
              mountPath: /app/data
            - name: media-data
              mountPath: {{ .Values.config.mediaPath }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.service.port }}
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.service.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: db-data
          persistentVolumeClaim:
            claimName: {{ include "arypodr.fullname" . }}-db
        - name: media-data
          persistentVolumeClaim:
            claimName: {{ include "arypodr.fullname" . }}-media
